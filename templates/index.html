<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Flow - Experience AI-Driven Streaming</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Google Font: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
</head>

<body>
    <!-- Background Elements -->
    <div class="bg-gradient"></div>
    <div class="particles" id="particles"></div>

    <header>
        <h1>Music Flow</h1>
        <nav>
            <a href="{{ url_for('login') }}">Login</a>
            <a href="{{ url_for('register') }}" class="nav-btn-glow">Get Started</a>
        </nav>
    </header>

    <main class="hero">
        <!-- Sound Visualizer Animation -->
        <div class="visualizer">
            <div class="bar" style="animation-delay: 0.1s; animation-duration: 1.2s;"></div>
            <div class="bar" style="animation-delay: 0.3s; animation-duration: 0.8s;"></div>
            <div class="bar" style="animation-delay: 0.5s; animation-duration: 1.5s;"></div>
            <div class="bar" style="animation-delay: 0.2s; animation-duration: 1.0s;"></div>
            <div class="bar" style="animation-delay: 0.4s; animation-duration: 1.3s;"></div>
            <div class="bar" style="animation-delay: 0.6s; animation-duration: 0.9s;"></div>
            <div class="bar" style="animation-delay: 0.1s; animation-duration: 1.1s;"></div>
            <div class="bar" style="animation-delay: 0.3s; animation-duration: 1.4s;"></div>
        </div>

        <h2>Music Flow</h2>
        <p>Experience AI-Driven Music Streaming and Playlist Recommendation System.</p>

        <div style="display: flex; gap: 20px;">
            <a href="{{ url_for('register') }}" class="btn-large">Start Streaming <i class="fas fa-play"
                    style="margin-left: 10px;"></i></a>
        </div>

        <!-- SVG Animated Waves -->
        <div class="waves-container">
            <svg class="waves" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
                viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
                <defs>
                    <path id="gentle-wave"
                        d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
                </defs>
                <g class="parallax">
                    <use xlink:href="#gentle-wave" x="48" y="0" fill="rgba(30, 41, 59, 0.4)" />
                    <use xlink:href="#gentle-wave" x="48" y="3" fill="rgba(125, 211, 252, 0.2)" />
                    <use xlink:href="#gentle-wave" x="48" y="5" fill="rgba(148, 163, 184, 0.1)" />
                    <use xlink:href="#gentle-wave" x="48" y="7" fill="var(--bg-dark)" />
                </g>
            </svg>
        </div>
    </main>

    <script>
        // Improved Particle Generator
        const particlesContainer = document.getElementById('particles');
        const particleCount = 40;
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 4 + 2 + 'px';
            particle.style.width = size;
            particle.style.height = size;
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = (Math.random() * 100 + 100) + '%';
            particle.style.background = 'var(--primary)';
            particle.style.opacity = '0.5';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = Math.random() * 10 + 10 + 's';
            particlesContainer.appendChild(particle);
        }

        // Reveal on scroll (simplified)
        const reveal = () => {
            const reveals = document.querySelectorAll('.reveal');
            reveals.forEach(el => {
                const windowHeight = window.innerHeight;
                const elementTop = el.getBoundingClientRect().top;
                if (elementTop < windowHeight - 50) {
                    el.classList.add('active');
                }
            });
        };
        window.addEventListener('load', reveal);
    </script>

    <style>
        .waves-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            overflow: hidden;
            line-height: 0;
        }
    </style>
</body>

</html>
